spring.application.name=my_spring_portfolio

# Persistence configuration
# Using a file-based H2 database to ensure data is not lost on restart
spring.datasource.url=jdbc:h2:file:./data/portfolio;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# PostgreSQL configuration (can be enabled by overriding properties)
# spring.datasource.url=jdbc:postgresql://localhost:5432/portfolio
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.datasource.driverClassName=org.postgresql.Driver

# JPA and Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Use 'update' to persist schema but allow modifications
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true