spring:
  datasource:
    url: jdbc:h2:file:./data/portfolio;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  cache:
    type: simple
  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 100
  web:
    error:
      include-binding-errors: always
      include-message: always
  thymeleaf:
    cache: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.maliksalimov.my_spring_portfolio: DEBUG
    org.springframework.web: DEBUG